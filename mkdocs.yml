site_name: TradeArk 用户手册
site_description: TradeArk 本地优先交易工作台使用手册
site_url: https://docs.tradeark.ai/
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: blue grey
      accent: blue grey
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          name: 简体中文
          build: true
          link: /zh/
          theme:
            language: zh
        - locale: en
          name: English
          default: true
          build: true
          link: /
          site_name: TradeArk User Manual
          site_description: User guide for the TradeArk local-first trading workstation
          theme:
            language: en
          nav:
            - Home: index.md
            - Getting Started:
                - Installation: getting-started/installation.md
                - First Run: getting-started/first-run.md
                - UI Overview: guides/ui-tour.md
                - Add Accounts: guides/add-account.md
            - Interface Guide:
                - Connect Exchange API Keys:
                    - Overview: guides/connect-exchange-keys/index.md
                    - OKX: guides/connect-exchange-keys/okx.md
                    - Binance: guides/connect-exchange-keys/binance.md
                    - Bitget: guides/connect-exchange-keys/bitget.md
                    - Gate.io: guides/connect-exchange-keys/gate.md
                    - Bybit: guides/connect-exchange-keys/bybit.md
                    - Add Keys to TradeArk: guides/connect-exchange-keys/TradeArk.md
                - Top Status Bar: guides/top-bar.md
                - Markets and Symbols Sidebar: guides/market-sidebar.md
                - Chart and Timeframe Tools: guides/chart-workspace.md
                - Bottom-Right AI Analysis: guides/ai-chart-analysis.md
                - AI Quick Order Modal: guides/ai-quick-order.md
                - One-Click Auto Trade: guides/auto-trade-launcher.md
                - Positions Tab: guides/positions-tab.md
                - Open Orders Tab: guides/open-orders-tab.md
                - Order History Tab: guides/order-history-tab.md
                - Position History Tab: guides/position-history-tab.md
                - Auto Trade Tab: guides/auto-trade-tab.md
                - Assets Tab: guides/assets-tab.md
                - Right Order Panel: guides/order-panel.md
                - Account Center: guides/account-center.md
                - AI Model Center: guides/ai-model-center.md
            - Workflows:
                - Manual Trading: guides/manual-trading.md
                - AI and Automation: guides/ai-automation.md
                - Updates and Maintenance: guides/update-maintenance.md
            - Reference:
                - FAQ: reference/faq.md
                - API Reference:
                    - Overview: reference/api.md
                    - Service and Health:
                        - GET /health: reference/api/health.md
                    - Private Read APIs:
                        - GET /positions: reference/api/positions.md
                        - GET /balances: reference/api/balances.md
                        - GET /orders-history: reference/api/orders-history.md
                        - GET /positions-history: reference/api/positions-history.md
                        - GET /open-orders: reference/api/open-orders.md
                        - GET /open-tpsl-orders: reference/api/open-tpsl-orders.md
                    - Trading Write APIs:
                        - POST /place-order: reference/api/place-order.md
                        - POST /cancel-order: reference/api/cancel-order.md
                        - POST /cancel-open-orders: reference/api/cancel-open-orders.md
                        - POST /close-all: reference/api/close-all.md
                        - POST /set-leverage: reference/api/set-leverage.md
                        - POST /set-margin-mode: reference/api/set-margin-mode.md
                        - POST /set-tpsl: reference/api/set-tpsl.md
                        - POST /cancel-tpsl: reference/api/cancel-tpsl.md
                    - Accounts and Local Settings:
                        - /accounts: reference/api/accounts.md
                        - "/accounts/:id": reference/api/account-by-id.md
                        - /accounts/test: reference/api/account-test.md
                        - "/accounts/:id/test": reference/api/account-by-id-test.md
                        - /settings/ai: reference/api/settings-ai.md
                        - /settings/bots: reference/api/settings-bots.md
                    - Market Data and AI:
                        - GET /market/symbols: reference/api/market-symbols.md
                        - GET /market/ticker: reference/api/market-ticker.md
                        - GET /market/tickers: reference/api/market-tickers.md
                        - GET /market/klines: reference/api/market-klines.md
                        - WS /ws/klines: reference/api/ws-klines.md
                        - POST /ai/proxy: reference/api/ai-proxy.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

